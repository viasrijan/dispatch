    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-tertiary: #000000;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --accent: #0e8a46;
            --accent-hover: #0b6b36;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-content {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            width: 100%;
            min-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #0e8a46;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-menu a {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover { color: #0e8a46; }

        .page-header {
            padding: 40px 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 24px;
            background: #0e8a46;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            margin-bottom: 24px;
        }

        .back-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .stories-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .story-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .story-card:hover { border-color: var(--accent); }

        .story-image {
            width: 100%;
            min-width: 1200px;
            height: 180px;
            object-fit: cover;
        }

        .story-content { padding: 16px; }

        .story-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .story-meta span { color: var(--accent); }

        .story-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .story-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
        }

        .pagination-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pagination-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0 16px;
        }

        .site-footer {
            border-top: 1px solid var(--border);
            padding: 60px 24px;
            margin-top: 60px;
        }

        .site-footer-content {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .stories-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .stories-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-menu { display: none; }
        }

        @media (max-width: 480px) {
            .stories-grid { grid-template-columns: 1fr; }
        }
    </style>

        const POSTS_PER_PAGE = 12;
        let currentPage = 1;

        function renderStories(page) {
            const start = (page - 1) * POSTS_PER_PAGE;
            const end = start + POSTS_PER_PAGE;
            const pageStories = allStories.slice(start, end);
            
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = pageStories.map(story => `
                <a href="#" class="story-card">
                    <img src="${story.image}" alt="${story.category}" class="story-image">
                    <div class="story-content">
                        <div class="story-meta"><span>●</span> ${story.category} · ${story.time}</div>
                        <h3 class="story-title">${story.title}</h3>
                        <div class="story-tags">
                            ${story.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(allStories.length / POSTS_PER_PAGE);
            const pagination = document.getElementById('pagination');
            
            let html = `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="page-info">...</span>`;
                }
            }
            
            html += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>`;
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(allStories.length / POSTS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderStories(page);
            renderPagination();
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        // Initialize
        renderStories(currentPage);
        renderPagination();
    </script>
