<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Stories | KICKOFF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-tertiary: #000000;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --accent: #0e8a46;
            --accent-hover: #0b6b36;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-content {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #0e8a46;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-menu a {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover { color: #0e8a46; }

        .page-header {
            padding: 40px 24px;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 24px;
            background: #0e8a46;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            margin-bottom: 24px;
        }

        .back-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .stories-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .story-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .story-card:hover { border-color: var(--accent); }

        .story-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .story-content { padding: 16px; }

        .story-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .story-meta span { color: var(--accent); }

        .story-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .story-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .site-footer {
            border-top: 1px solid var(--border);
            padding: 60px 24px;
            margin-top: 60px;
        }

        .site-footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .stories-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .stories-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-menu { display: none; }
        }

        @media (max-width: 480px) {
            .stories-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-content">
            <a href="index.html" class="logo">KICKOFF</a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="matches.html">Matches</a></li>
                    <li><a href="transfers.html">Transfers</a></li>
                    <li><a href="leagues.html">Leagues</a></li>
                    <li><a href="rumors.html">Rumors</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <h1 class="page-title">All Stories</h1>
    </div>

    <div class="stories-container">
        <div class="stories-grid" id="storiesGrid">
            <!-- Stories will be populated here -->
        </div>
    </div>

    <footer class="site-footer">
        <div class="site-footer-content">
            <p style="color:var(--text-muted)">© 2026 KICKOFF. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Sample stories for demonstration
        const stories = [
            { title: "Premier League Title Race Heats Up", category: "Premier League", time: "15 min ago", image: "https://images.unsplash.com/photo-1511882150382-421056c89033?w=1024&h=768&fit=crop", tags: ["Europe", "Premier League"] },
            { title: "Real Madrid Complete Record Signing", category: "Transfers", time: "28 min ago", image: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1024&h=768&fit=crop", tags: ["Europe", "La Liga", "Transfers"] },
            { title: "Champions League Final Preview", category: "Champions League", time: "42 min ago", image: "https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=1024&h=768&fit=crop", tags: ["Europe", "Champions League"] },
            { title: "Barcelona Youth Star Breaks Through", category: "La Liga", time: "1 hour ago", image: "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=1024&h=768&fit=crop", tags: ["Europe", "La Liga"] },
            { title: "Bayern Munich Secure Domestic Double", category: "Bundesliga", time: "2 hours ago", image: "https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1024&h=768&fit=crop", tags: ["Europe", "Bundesliga"] },
            { title: "Messi Scores Stunner for Inter Miami", category: "MLS", time: "3 hours ago", image: "https://images.unsplash.com/photo-1560272564-c8304700f87c?w=1024&h=768&fit=crop", tags: ["North America", "MLS"] },
            { title: "Arsenal Title Bid Hangs in the Balance", category: "Premier League", time: "4 hours ago", image: "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=1024&h=768&fit=crop", tags: ["Europe", "Premier League"] },
            { title: "Mbappe Double Secures Vital Victory", category: "La Liga", time: "5 hours ago", image: "https://images.unsplash.com/photo-1511882150382-421056c89033?w=1024&h=768&fit=crop", tags: ["Europe", "La Liga"] },
        ];

        const grid = document.getElementById('storiesGrid');
        grid.innerHTML = stories.map(story => `
            <a href="#" class="story-card">
                <img src="${story.image}" alt="${story.category}" class="story-image">
                <div class="story-content">
                    <div class="story-meta"><span>●</span> ${story.category} · ${story.time}</div>
                    <h3 class="story-title">${story.title}</h3>
                    <div class="story-tags">
                        ${story.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            </a>
        `).join('');
    </script>
</body>
</html>
