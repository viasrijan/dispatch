<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leagues | KICKOFF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #000000; --bg-secondary: #000000; --bg-tertiary: #000000; --border: #1a1a1a; --accent: #0e8a46; --text-primary: #ffffff; --text-secondary: #cccccc; --text-muted: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        a { text-decoration: none; color: inherit; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); background: #000; position: sticky; top: 0; z-index: 100; }
        .top-bar-content { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 800; color: #0e8a46; }
        .nav-menu { display: flex; gap: 40px; list-style: none; }
        .nav-menu a { color: #fff; font-size: 0.9rem; font-weight: 500; }
        .nav-menu a:hover { color: #0e8a46; }
        .page-header { padding: 40px 24px; border-bottom: 1px solid var(--border); }
        .back-button { display: inline-flex; align-items: center; gap: 8px; color: #fff; font-size: 0.9rem; margin-bottom: 16px; }
        .back-button:hover { color: #0e8a46; }
        .page-title { font-size: 2rem; font-weight: 800; }
        .leagues-container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .league-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        .league-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 24px; text-align: center; transition: all 0.3s; }
        .league-card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .league-card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .league-card-subtitle { font-size: 0.85rem; color: var(--text-muted); }
        @media (max-width: 768px) { .league-cards { grid-template-columns: repeat(2, 1fr); } .nav-menu { display: none; } }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-content">
            <a href="index.html" class="logo">KICKOFF</a>
            <nav><ul class="nav-menu"><li><a href="matches.html">Matches</a></li><li><a href="transfers.html">Transfers</a></li><li><a href="leagues.html">Leagues</a></li><li><a href="rumors.html">Rumors</a></li><li><a href="contact.html">Contact</a></li></ul></nav>
        </div>
    </header>
    <div class="page-header">
        <div style="max-width:1200px;margin:0 auto;padding:0 24px;">
            <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h1 class="page-title">Leagues</h1>
        </div>
    </div>
    <div class="leagues-container">
        <div class="league-cards">
            <a href="premier-league.html" class="league-card">
                <div class="league-card-title">Premier League</div>
                <div class="league-card-subtitle">England</div>
            </a>
            <a href="la-liga.html" class="league-card">
                <div class="league-card-title">La Liga</div>
                <div class="league-card-subtitle">Spain</div>
            </a>
            <a href="serie-a.html" class="league-card">
                <div class="league-card-title">Serie A</div>
                <div class="league-card-subtitle">Italy</div>
            </a>
            <a href="bundesliga.html" class="league-card">
                <div class="league-card-title">Bundesliga</div>
                <div class="league-card-subtitle">Germany</div>
            </a>
            <a href="ligue-1.html" class="league-card">
                <div class="league-card-title">Ligue 1</div>
                <div class="league-card-subtitle">France</div>
            </a>
        </div>
    </div>
</body>
</html>
