<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers | KICKOFF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-tertiary: #000000;
            --border: #1a1a1a;
            --accent: #0e8a46;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #666666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        a { text-decoration: none; color: inherit; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); background: #000; position: sticky; top: 0; z-index: 100; }
        .top-bar-content { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 800; color: #0e8a46; }
        .nav-menu { display: flex; gap: 40px; list-style: none; }
        .nav-menu a { color: #fff; font-size: 0.9rem; font-weight: 500; }
        .nav-menu a:hover { color: #0e8a46; }
        .page-header { padding: 40px 24px; border-bottom: 1px solid var(--border); }
        .back-button { display: inline-flex; align-items: center; gap: 8px; color: #fff; font-size: 0.9rem; margin-bottom: 16px; }
        .back-button:hover { color: #0e8a46; }
        .page-title { font-size: 2rem; font-weight: 800; }
        .tag-page-content { display: grid; grid-template-columns: 65% 35%; gap: 32px; padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        .posts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .post-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .post-card:hover { border-color: var(--accent); }
        .post-card-image { width: 100%; height: 160px; object-fit: cover; }
        .post-card-content { padding: 16px; }
        .post-card-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .post-card-meta span { color: var(--accent); }
        .post-card-title { font-size: 1rem; font-weight: 600; }
        .league-section { position: sticky; top: 100px; }
        .league-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
        .league-arrow { color: var(--accent); font-size: 1.2rem; cursor: pointer; }
        .league-name { font-size: 1.2rem; font-weight: 700; min-width: 100px; text-align: center; }
        .league-table { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; }
        .league-table-header, .league-table-row { display: grid; grid-template-columns: 40px 1fr 50px 40px; padding: 12px 16px; }
        .league-table-header { background: var(--bg-tertiary); font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .league-table-row { border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .league-position { color: var(--text-muted); font-weight: 600; }
        .league-position.top-4 { color: var(--accent); }
        .league-team { font-weight: 500; }
        .league-points { font-weight: 700; color: var(--accent); }
        .league-gd { color: var(--text-secondary); }
        @media (max-width: 768px) { .tag-page-content { grid-template-columns: 1fr; } .posts-grid { grid-template-columns: 1fr; } .nav-menu { display: none; } }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-content">
            <a href="index.html" class="logo">KICKOFF</a>
            <nav><ul class="nav-menu"><li><a href="matches.html">Matches</a></li><li><a href="transfers.html">Transfers</a></li><li><a href="leagues.html">Leagues</a></li><li><a href="rumors.html">Rumors</a></li><li><a href="contact.html">Contact</a></li></ul></nav>
        </div>
    </header>
    <div class="page-header">
        <div class="page-title" style="max-width:1200px;margin:0 auto;padding:0 24px;">
            <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h1 class="page-title">Transfers</h1>
        </div>
    </div>
    <main class="tag-page-content">
        <section class="posts-section">
            <div class="posts-grid" id="postsGrid"></div>
        </section>
        <aside class="league-section">
            <div class="league-selector">
                <span class="league-arrow" onclick="changeLeague(-1)"><i class="fas fa-chevron-left"></i></span>
                <span class="league-name" id="leagueName">EPL</span>
                <span class="league-arrow" onclick="changeLeague(1)"><i class="fas fa-chevron-right"></i></span>
            </div>
            <div class="league-table">
                <div class="league-table-header"><span>#</span><span>Team</span><span>GD</span><span>Pts</span></div>
                <div id="leagueTableBody"></div>
            </div>
        </aside>
    </main>
    <script>
        const leagues = [{ id: 'PL', name: 'EPL', apiId: 39 },{ id: 'PD', name: 'La Liga', apiId: 140 },{ id: 'SA', name: 'Serie A', apiId: 135 },{ id: 'BL1', name: 'Bundesliga', apiId: 78 },{ id: 'FL', name: 'Ligue 1', apiId: 61 }];
        let currentLeagueIndex = 0;
        const API_KEY = 'aHTLQzXCujiYS7_3lklegad9atK2HsIiNZxX9Ugj581dn7VWk0y5OFoeUfT5qqXd9KQjbpmGwBT3BlbkFJYBVtfsu74rBsWqaep4utAQ5hQD6mOlgjVV9lbqkvLECHcQFZsvzhvHr1q5J8cxMPKgkTZRmGIA';
        function changeLeague(direction) { currentLeagueIndex = (currentLeagueIndex + direction + leagues.length) % leagues.length; document.getElementById('leagueName').textContent = leagues[currentLeagueIndex].name; fetchLeagueTable(); }
        async function fetchLeagueTable() {
            const league = leagues[currentLeagueIndex];
            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${league.apiId}/standings`, { headers: { 'X-Auth-Token': API_KEY } });
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                const standings = data.standings[0].table.slice(0, 10);
                document.getElementById('leagueTableBody').innerHTML = standings.map(team => `<div class="league-table-row"><span class="league-position ${team.position <= 4 ? 'top-4' : ''}">${team.position}</span><span class="league-team">${team.team.shortName}</span><span class="league-gd">${team.goalDifference > 0 ? '+' : ''}${team.goalDifference}</span><span class="league-points">${team.points}</span></div>`).join('');
            } catch(e) { document.getElementById('leagueTableBody').innerHTML = '<div class="league-table-row"><span colspan="4" style="text-align:center;color:var(--text-muted)">Unable to load standings</span></div>'; }
        }
        document.getElementById('leagueName').textContent = leagues[currentLeagueIndex].name;
        fetchLeagueTable();
    </script>
</body>
</html>
