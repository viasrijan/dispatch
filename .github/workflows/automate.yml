name: KICKOFF AI Content Automation

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  generate-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content & images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automate.py

      - name: Commit and push changes
        if: success()
        run: |
          mkdir -p images
          git config --global user.name "KICKOFF Bot"
          git config --global user.email "kickoff-bot@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add -A
          git diff --staged --quiet || git commit -m "AI content & images: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push