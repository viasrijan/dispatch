name: AI Content Automation

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python automate.py

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "Dispatch Bot"
          git config --global user.email "dispatch-bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push