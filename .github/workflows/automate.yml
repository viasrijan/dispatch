name: KICKOFF AI Content Automation + Deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-all:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content & images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 automate.py

      - name: Commit source changes
        if: success()
        run: |
          mkdir -p images
          git config --global user.name "KICKOFF Bot"
          git config --global user.email "kickoff-bot@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add -A
          git diff --staged --quiet || git commit -m "AI content & images: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy:
    needs: generate-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          user_name: KICKOFF Bot
          user_email: kickoff-bot@github.com