name: AI Content & Image Automation

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aiohttp

      - name: Generate AI images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_images.py

      - name: Commit and push image changes
        if: success()
        run: |
          git config --global user.name "KICKOFF Bot"
          git config --global user.email "kickoff-bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "AI-generated images: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python automate.py

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "KICKOFF Bot"
          git config --global user.email "kickoff-bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-content-update: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push